name: Lint Codebase

# This defines when the robot runs
on:
  push:
    branches: [ main, dev, "feature/**" ]
  pull_request:
    branches: [ main, dev ]

jobs:
  run-linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Caching dependencies makes the "robot" run much faster
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        # This calls the "lint" script we added to your package.json
        run: npm run lint