name: Lint Codebase

on:
  push:
    branches: [ main, dev, "feature/**" ]
  pull_request:
    branches: [ main, dev ]

jobs:
  run-linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # We'll skip the cache for one run to make sure it's not a cache ghost causing the crash
          
      - name: Debug Folder Structure
        # This will print exactly what files the robot sees so we can verify the path
        run: ls -R

      - name: Install Dependencies
        # Using --prefix is a bulletproof way to tell npm where the package.json is
        run: npm install --prefix Backend

      - name: Run ESLint
        # Running the script from the root but pointing it to the Backend folder
        run: npm run lint --prefix Backend