name: Lint Codebase

on:
  push:
    branches: [ main, dev, "feature/**" ]
  pull_request:
    branches: [ main, dev ]

jobs:
  run-linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # Tell the runner exactly where the lock file is for caching
          cache-dependency-path: Backend/package-lock.json

      - name: Install Dependencies
        # npm ci is faster and cleaner for robots/CI than npm install
        run: npm ci
        working-directory: Backend

      - name: Run ESLint
        run: npm run lint
        working-directory: Backend